name: Sync GitHub changes back to Codeberg

on:
  push:
    branches: [ main, master ]  # Adjust to match your primary branch

jobs:
  sync-back:
    # IMPORTANT: This line prevents an infinite loop. 
    # It stops the action if the push came from Codeberg's mirroring bot.
    if: github.actor != 'codeberg-mirror-bot-username-if-known' && !contains(github.event.head_commit.message, 'Codeberg')
    
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push updates back to Codeberg
        run: |
          # Configure a temporary remote for Codeberg using your secret token
          git remote add codeberg https://${{ secrets.CODEBERG_TOKEN }}@codeberg.org/YOUR_CODEBERG_USERNAME/YOUR_REPO_NAME.git
          
          # Fetch Codeberg's state to prevent accidents, then push GitHub's current branch up
          git fetch codeberg
          git push codeberg HEAD:${{ github.ref_name }}
