name: Sync GitHub changes back to Codeberg

on:
  push:
    branches: [ main, master ]  # Match your default branch

jobs:
  sync-back:
    # Run only if the commit wasn't a Codeberg mirror transfer
    if: |
      !contains(github.event.head_commit.message, '[skip ci]') && 
      !contains(github.event.head_commit.message, 'gitea') &&
      !contains(github.event.head_commit.message, 'codeberg')
    
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push updates back to Codeberg
        run: |
          git remote add codeberg https://${{ secrets.CODEBERG_TOKEN }}@codeberg.org/thepanoc95/pocketdarwin.git
          git fetch codeberg
          git push codeberg HEAD:${{ github.ref_name }}
